name: Release

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Test
        run: task test-setup

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get timestamp
        id: timestamp
        run: echo "value=$(date +'%Y-%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/dockerfile
          target: release
          push: true
          tags: |
            ghcr.io/dorossii/backend:latest
            ghcr.io/dorossii/backend:${{ steps.timestamp.outputs.value }}
