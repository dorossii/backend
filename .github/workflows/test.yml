name: Test

on:
  pull_request:
    branches:
      - "**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start mysql-test
        run: docker compose -f docker-compose.yaml -f docker-compose.test.yml up mysql-test -d --wait

      - name: Run tests
        run: docker compose -f docker-compose.yaml -f docker-compose.test.yml run --rm --no-deps app -c "cd /app && go test -v -p 1 ./..."
