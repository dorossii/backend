# https://taskfile.dev

version: '3'

vars:
  GREETING: Hello, World!

tasks:
  # コンテナ落として全て削除
  clean:
    cmds:
      - docker compose down --remove-orphans --rmi all --volumes
    silent: true
  
  # コンテナ落とす
  down:
    cmds:
      - docker compose down
    silent: true
  
  # コンテナ起動
  up:
    cmds:
      - docker compose up -d --build
    silent: true

  # auth にアタッチ
  atauth:
    cmds:
      - docker compose logs auth
      - docker compose attach auth

  # データベース接続
  dbshell:
    cmds:
      - docker compose exec {{.DBContainer}} mysql -u root -p {{.Database}} --password=$DBPassword
    env:
      DBPassword: root
    vars:
      # Database: maindb
      Database: authdb
      DBContainer: mysql
    silent: true
  
  # データベースのリセット
  dbreset:
    cmds:
      - docker compose down mysql --volumes --remove-orphans
      - docker compose up mysql -d --build
    silent: true
  
  # 初回セットアップ
  setup:
    cmds:
      - echo "セットアップを開始します"
      - echo "設定用のコンテナを生成しています"
      - task: config
      - echo "JWT鍵を生成しています"
      - task: genkey
      - echo "コンテナを起動しています"
      - task: up
    silent: true
      # - task: dbreset
      # - task: dashb
  # dashb:
  #   cmds:
  #     - docker compose exec dashboard npm i --verbose --force
  #     - docker compose exec dashboard npm run build
  #     - docker compose logs -f auth

  genkey:
    cmds:
      - cmd: docker run --rm -it -v .\\openssl\\jwtKeys:/jwtkeys -v .\\nginx\\keys:/sslkeys {{.Build_Image}}
        platforms: [windows]
      - cmd: docker run --rm -it -v ./openssl/jwtKeys:/jwtkeys -v ./nginx/keys:/sslkeys {{.Build_Image}}
        platforms: [linux,darwin]
    vars:
      Build_Image:
        sh: docker build -q ./openssl
  
  # テスト用DBを起動
  test-up:
    cmds:
      - docker compose -f docker-compose.test.yml up -d --wait

  # テスト用DBを起動してから全テストを実行
  test-setup:
    cmds:
      - task: test-up
      - task: test

  # 全テストを実行
  test:
    cmds:
      - docker compose -f docker-compose.test.yml run --rm --no-deps app -c "cd /app && go test -v -p 1 ./..."

  # models のテストを実行
  test:models:
    cmds:
      - docker compose -f docker-compose.test.yml run --rm --no-deps app -c "cd /app/models && go test -v"

  # repositories のテストを実行
  test:repositories:
    cmds:
      - docker compose -f docker-compose.test.yml run --rm --no-deps app -c "cd /app/repositories && go test -v"

  # services のテストを実行
  test:services:
    cmds:
      - docker compose -f docker-compose.test.yml run --rm --no-deps app -c "cd /app/services && go test -v"

  config:
    cmds:
      - cmd: docker run --rm -it -v .\\config:/config/data {{.Build_Image}}
        platforms: [windows]
      - cmd: docker run --rm -it -v ./config:/config/data {{.Build_Image}}
        platforms: [linux,darwin]
      - echo "設定用のイメージを削除しています"
      - docker rmi -f {{.Build_Image}}
    vars:
      Build_Image:
        sh: docker build -q ./config
